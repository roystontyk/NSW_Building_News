name: NSW Building Commission Monitor

on:
# 🔴 NEW: This allows the iPhone/Orchestrator to trigger this repo
  repository_dispatch:
    types: [trigger-all-repos]
    
  schedule:
    - cron: '0 21 * * *'  # Runs daily at 7 AM Sydney time
  workflow_dispatch:      # Manual trigger button

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        # Added lxml to prevent parsing crashes
        run: pip install requests beautifulsoup4 lxml
      
      - name: Run Master Monitor
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
