name: NSW Building Commission Monitor

on:
  # Allows your iPhone/Orchestrator to trigger this via API
  repository_dispatch:
    types: [trigger-all-repos]
    
  # MATCHED: Runs daily at 8:30 AM Sydney/Melbourne time (AEDT)
  # 21:30 UTC = 08:30 AEDT
  schedule:
    - cron: '30 21 * * *' 
    
  # Manual trigger button
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      
      - name: Run Master Monitor
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Ensures the underlying system recognizes the local timezone
          TZ: 'Australia/Sydney'
